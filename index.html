<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main>
    <h1>Contact Us</h1>
    <p>Please fill out the form below to get in touch.</p>

    <form action="#" method="post">

        <!-- Basic Info -->
        <label for="name">Full Name *</label>
        <input type="text" id="name" name="name" required minlength="3" placeholder="John Doe">
        <small>Enter at least 3 characters</small>

        <label for="email">Email Address *</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">

        <label for="phone">Phone Number *</label>
        <input type="tel" id="phone" name="phone" required 
               pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
               placeholder="123-456-7890">
        <small>Format: 123-456-7890</small>

        <!-- Subject Dropdown -->
        <label for="subject">Subject *</label>
        <select id="subject" name="subject" required>
            <option value="">--Select a topic--</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support</option>
            <option value="feedback">Feedback</option>
        </select>

        <!-- Urgency (Radio Buttons) -->
        <fieldset>
            <legend>Urgency Level *</legend>

            <input type="radio" id="low" name="urgency" value="low" required>
            <label for="low">Low</label>

            <input type="radio" id="medium" name="urgency" value="medium">
            <label for="medium">Medium</label>

            <input type="radio" id="high" name="urgency" value="high">
            <label for="high">High</label>
        </fieldset>

        <!-- Contact Preferences (Checkboxes) -->
        <fieldset>
            <legend>Preferred Contact Method</legend>

            <input type="checkbox" id="emailPref" name="contactPref" value="email">
            <label for="emailPref">Email</label>

            <input type="checkbox" id="phonePref" name="contactPref" value="phone">
            <label for="phonePref">Phone</label>
        </fieldset>

        <!-- Number Input -->
        <label for="rating">Satisfaction Rating (1-5)</label>
        <input type="number" id="rating" name="rating" min="1" max="5">

        <!-- Message -->
        <label for="message">Message *</label>
        <textarea id="message" name="message" required minlength="10" maxlength="300"
                  placeholder="Write your message here..."></textarea>
        <small>10–300 characters</small>

        <!-- Submit -->
        <button type="submit">Send Message</button>

        <!-- Success Message -->
        <p class="success">
            ✅ Thanks! We’ve received your message and will respond within 24 hours.
        </p>

    </form>
</main>

</body>
</html>
